<script>const quizData = [
  
  
    

  {
    question: "Which data structure uses FIFO?",
    options: ["Stack", "Queue", "Linked List", "Tree"],
    answer: 1
  },
  {
    question: "Which data structure uses LIFO?",
    options: ["Stack", "Queue", "Graph", "Array"],
    answer: 0
  },
  {
    question: "Which is used for hierarchical data?",
    options: ["Queue", "Stack", "Tree", "Linked List"],
    answer: 2
  }
];

let current = 0;

function loadQuestion() {
  const q = quizData[current];
  document.getElementById("question").innerText = q.question;
  const btns = document.querySelectorAll(".option-btn");
  btns.forEach((btn,i) => btn.innerText = q.options[i]);
  document.getElementById("feedback").innerText = "";
}

function checkAnswer(i) {
  if(i === quizData[current].answer){
    document.getElementById("feedback").innerText = "Correct!";
    document.getElementById("feedback").style.color = "lightgreen";
  } else {
    document.getElementById("feedback").innerText = "Incorrect!";
    document.getElementById("feedback").style.color = "red";
  }
}

function nextQuestion() {
  current++;
  if(current >= quizData.length) current = 0; // restart quiz
  loadQuestion();
}

// load first question
loadQuestion();</script>
