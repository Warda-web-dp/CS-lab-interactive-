<!DOCTYPE html>
<html lang="en">

<style>

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #081948;
  font-family: Arial, sans-serif;
}

/* ===== SPLASH CONTAINER ===== */
.splash {
  text-align: center;
  color: white;
  font-size: 20px;
}

/* ===== LOGO ===== */
.logo {

  height: 120px;
  margin-bottom: 20px;
  animation: zoom 1.5s ease-in-out infinite alternate;

/* ===== TEXT ===== */

  to { transform: scale(1.1); }

<div class="splash">
